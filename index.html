<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maersk | Lowe's Last Mile CX Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2236;
    --border: #1e3a5f; --accent: #00aaff; --accent2: #0066cc;
    --maersk: #42b0d5; --text: #e2e8f0; --text-muted: #8899bb;
    --user-bg: #0d2340; --success: #10b981; --escalate: #f97316; --warn: #f59e0b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:60px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; position:relative; }
  header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.4; }
  .header-left { display:flex; align-items:center; gap:12px; }
  .logo-maersk { font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:14px; color:var(--maersk); letter-spacing:0.08em; }
  .logo-div { width:1px; height:20px; background:var(--border); }
  .logo-lowes { font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px; color:#5b9bd5; }
  .header-title { font-size:13px; color:var(--text-muted); }
  .status-dot { width:8px; height:8px; background:var(--success); border-radius:50%; box-shadow:0 0 8px var(--success); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .status-text { font-size:11px; color:var(--success); font-family:'IBM Plex Mono',monospace; }
  .chat-wrapper { flex:1; display:flex; flex-direction:column; overflow:hidden; max-width:900px; width:100%; margin:0 auto; padding:0 16px; }
  #messages { flex:1; overflow-y:auto; padding:20px 0; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
  #messages::-webkit-scrollbar { width:4px; }
  #messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .msg { display:flex; gap:10px; animation:slideIn 0.25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction:row-reverse; }
  .avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; font-family:'IBM Plex Mono',monospace; }
  .avatar.bot { background:linear-gradient(135deg,var(--accent2),var(--accent)); color:white; }
  .avatar.user { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
  .bubble { max-width:78%; padding:12px 16px; border-radius:12px; font-size:13.5px; line-height:1.6; }
  .msg.bot .bubble { background:var(--surface); border:1px solid var(--border); border-radius:4px 12px 12px 12px; }
  .msg.user .bubble { background:var(--user-bg); border:1px solid var(--accent2); border-radius:12px 4px 12px 12px; }
  .bubble.tier2, .bubble.tier3 { border-color:var(--escalate)!important; background:#1a1000!important; }
  .bubble.tier1 { border-color:var(--warn)!important; background:#1a1500!important; }
  .bubble.dispatcher { border-color:#7c3aed!important; background:#120d1a!important; }
  .badge { display:inline-flex; align-items:center; gap:6px; font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; font-family:'IBM Plex Mono',monospace; letter-spacing:0.08em; margin-bottom:8px; text-transform:uppercase; }
  .badge.red { background:var(--escalate); color:white; }
  .badge.yellow { background:var(--warn); color:#000; }
  .badge.purple { background:#7c3aed; color:white; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .chip { padding:5px 12px; border:1px solid var(--border); border-radius:20px; font-size:12px; cursor:pointer; color:var(--text-muted); background:var(--surface2); transition:all 0.2s; }
  .chip:hover { border-color:var(--accent); color:var(--accent); }
  .thinking { display:flex; gap:4px; align-items:center; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:4px 12px 12px 12px; width:fit-content; }
  .dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-4px);opacity:1} }
  .input-area { padding:12px 0 16px; border-top:1px solid var(--border); flex-shrink:0; position:relative; }
  .input-area::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.25; }
  .input-row { display:flex; gap:8px; align-items:flex-end; }
  #userInput { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:13.5px; resize:none; min-height:42px; max-height:120px; outline:none; transition:border-color 0.2s; line-height:1.5; }
  #userInput::placeholder { color:var(--text-muted); }
  #userInput:focus { border-color:var(--accent); }
  #sendBtn { width:42px; height:42px; background:linear-gradient(135deg,var(--accent2),var(--accent)); border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
  #sendBtn:hover { opacity:0.9; transform:scale(1.03); }
  #sendBtn svg { width:18px; height:18px; color:white; }
  .input-hint { font-size:11px; color:var(--text-muted); margin-top:6px; text-align:center; font-family:'IBM Plex Mono',monospace; }
  .bubble strong { color:var(--accent); font-weight:600; }
  .bubble ul { padding-left:16px; margin-top:6px; }
  .bubble li { margin-bottom:3px; color:var(--text-muted); }
  .bubble li strong { color:var(--text); }
  .tag { display:inline-block; background:rgba(0,170,255,0.1); border:1px solid rgba(0,170,255,0.25); color:var(--accent); font-size:11px; padding:1px 6px; border-radius:4px; font-family:'IBM Plex Mono',monospace; }
  .note-box { background:#0d1f0d; border:1px solid #1a4a1a; border-radius:8px; padding:10px 14px; margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:#a0c8a0; line-height:1.6; }
  .note-label { font-size:10px; color:var(--success); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; font-weight:600; }
  * { scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <span class="logo-maersk">MAERSK</span>
    <div class="logo-div"></div>
    <span class="logo-lowes">LOWE'S LAST MILE</span>
    <span class="header-title">CX Assistant v2</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="status-dot"></div>
    <span class="status-text">ONLINE</span>
  </div>
</header>

<div class="chat-wrapper">
  <div id="messages"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Describe the situation — customer call, driver issue, installation problem..." rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
const SYS = `You are the CX Virtual Assistant for Maersk Last Mile — Lowe's Home Delivery operations.

ROLE: Support live CX agents and dispatchers during active calls with customers AND drivers. Provide fast, accurate protocol guidance based exclusively on Maersk/Lowe's Last Mile CX training. You do NOT replace agent judgment — you equip agents with the right protocol so they can make informed decisions quickly.

CRITICAL OUTPUT FORMAT — respond ONLY with raw valid JSON, no extra text, no code blocks:
{
  "escalate": true|false,
  "notify_dispatcher": true|false,
  "tier": null|1|2|3,
  "badge": null|"string",
  "reason": null|"string",
  "response": "markdown string",
  "note_template": null|"string"
}

Fields:
- escalate: true if CX Leader or Area Manager must be looped in NOW
- notify_dispatcher: true if dispatcher needs to be informed (can be true even if escalate is false)
- tier: 1=minor (dispatcher/hauler), 2=moderate (CX Leader), 3=critical (CX Leader URGENT). null=routine
- badge: short label shown to agent. null if routine. Examples: "ESCALATE – CX LEADER", "NOTIFY DISPATCHER", "SUPERVISOR REQUIRED"
- reason: brief reason for badge. null if routine
- response: your guidance using **bold** for key info and bullet lists. Concise — agent is on a live call.
- note_template: EDP note agent can adapt. Format: "VTV/LVM w/ [Driver/Cust], [situation]. [Action taken]. [Outcome/next step]. [Initials]"

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
KNOWLEDGE BASE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

CALL PROTOCOLS

Ghost Call: No response within 5 sec → greet 3 times, 5 sec apart, max 30-35 sec total. Close: "It seems there is no response on the line. I will now disconnect the call. Please feel free to call us back if you need assistance. Thank you." Do NOT callback. Disposition: Ghost Call.

Dropped Call: Disconnects AFTER interaction began → callback within 1-2 min. If answers: "It seems our call was disconnected. I apologize for that. Let me continue assisting you." If no answer: leave voicemail. Document callback attempt + outcome. Disposition: Dropped Call (NOT Ghost Call).

Call Back – No Response: New disposition. Use when you call back from any queue and get no live answer (VM or no answer). If you DO speak with someone, use outcome-based disposition instead.

Order Lookup: FIRST action on every call = search by the phone number the customer is calling FROM. Do this BEFORE asking for order # or placing on hold. If found: confirm account + order, ask clarifying questions. If not found: then ask for phone # or order #. Goal: locate within first 30 seconds.

Dispositions: Always select correct disposition within 45 sec of call end. Default "Booking" (ACW) inflates reports — must be brought to zero. Never leave without selecting.

Supervisor Transfer — ZERO TOLERANCE: Customer can request supervisor at ANY time, no reason needed. NEVER refuse, delay, debate, or ask "Why do you want to speak to them?" Acknowledge and transfer IMMEDIATELY. While waiting: "While I get my supervisor on the line, would you mind sharing more details so I can explain your situation to them?" Refusing or delaying = QA penalty + corrective action.

Follow-Up Calls — MANDATORY: Every time a driver calls about a delivery issue, CX MUST call the customer — even if driver already told them. Required for: cannot install for any reason, drop-off only instead of install, special requirements needed (smaller truck, 4-man team), installation issues (copper/plastic line, bad valves, water/gas line issues, leaks, stacking kit). No exceptions.

WHAT LOWE'S HANDLES (redirect customer):
Reschedules/new delivery dates, change of address/order mods, cancellations/partial orders, weather delays, orders after 4pm cutoff, financial transactions/refunds, COI/building requirements (customer contacts Lowe's), claims initiation (must get claim # from Lowe's first)

WHAT CX/MAERSK HANDLES:
Confirm delivery today (NARROWED+), confirm future delivery, explain reschedule process, courtesy haul away (team on-site or en route), Save the Sale, driver support, follow-up calls, COI guidance (locate order + provide store contact + note order)

ORDER STATUSES:
SCHEDULED: created, not routed | NARROWED: routed, not picked up — can confirm timeframe | LOADED: team loading at store | IN TRANSIT: en route | OUT FOR DELIVERY: first stop marked in transit | ARRIVED: at home | DELIVERED: completed | NOT DELIVERED: refusal/NAH/wrong product | NOT LOADED: missing/no stock/store not ready

DELIVERY REQUIREMENTS:
Someone 18+ must be present (exception: Lock-Box store-approved). Clear path required. Old units sanitary for haul away. Driver pre-call ~30 min before.

NAH PROCEDURE:
1. Driver pre-call 30 min prior
2. Arrival: driver photographs building, contacts dispatch
3. CX contacts customer 2nd time — arrival + 15-min departure window
4. After 15 min: photo of door with NAH hanger, upload to EDP
5. Customer MUST call store to reschedule
PROPER NAH → customer calls store. No further CX action.
IMPROPER NAH → CX contacts dispatcher + hauler + Area Manager to attempt team return.

INSTALLATION — IN SCOPE (we do these):
Appliances: Washers, Dryers, Refrigerators, Ranges
Tasks: install feet/level, door swings, fridge strips, door reversal, anti-tip bracket, haul away, one-room move of old unit, stack kit/pedestals/steam kits, gas connection (where permitted + valve in place)

INSTALLATION — DROP-OFF ONLY — "If it's in the Wall, don't Install!":
Built-in Refrigerators, Built-in Ranges, Dishwashers, OTR Microwaves, Range Hoods, Drain Pans, Wall Ovens, Cook Tops, Drop-In Ranges, Air Conditioners, Water Heaters, Grills
→ Garage or first floor drop-off only. Customer contacts Lowe's installation dept.

INSTALLATION — OUT OF SCOPE (explain + recommend plumber/electrician):
No shutoff valve within 6 ft (water) or 5 ft (gas) | Copper or plastic lines | Corroded pipes | Waterline through floor/cabinets | Range without anti-tip bracket (drop-off only) | Propane (NEVER, any state) | Gas-to-propane conversions (NEVER) | Hard wiring | Grounding alterations (needs electrician) | Dishwasher/OTR installation | Door removal to fit (unless customer consents) | HA of dishwasher/gas appliance still connected in non-gas market

GAS INSTALLATION — UPDATED STATE LIST:
CAN install natural gas in: Alabama, Alaska, Arkansas, California, Colorado, Delaware, Florida, Idaho, Illinois, Indiana, Kansas, Kentucky, Michigan, Mississippi, Missouri, Montana, Nebraska, Nevada, New Jersey, North Dakota, Ohio, Oklahoma, Oregon, Pennsylvania, Utah, Washington, West Virginia, Wisconsin, Wyoming.
NOT on list = NO gas install. Propane = NEVER. Gas-to-propane = NEVER.

REAL CASE CRITERIA — use for mixed/complex scenarios:

Case 205 — Propane/LP gas on arrival: Drop-off only. Not certified for LP. Customer needs certified LP technician.
Case 208 — Active hot water valve leak: Drop-off only. Refuse connection. Customer contacts licensed plumber, then Lowe's for service call.
Case 209 — Leaking valve + upset customer: Drop-off only. Validate frustration, safety first. Customer: plumber → then Lowe's for reschedule.
Case 215 — House under renovation, outlets not ready: Partial connection where safe (power only). Customer completes remainder (ice maker) when ready. Document what was/was not done.
Case 216 — Plastic hose + glued gas line: Placement only, no connection. Non-standard = safety risk. Customer needs plumber/gas tech.
Case 218 — Old unit still connected on arrival: Wait on-site for customer to disconnect. Once cleared: proceed with HA + drop-off/install. Do NOT leave and return.
Case 211 — No haul away unit (previous team already removed): Drop-off only. HA not applicable. Document in order.
Case 212 — Customer caused floor damage before delivery: Document pre-existing damage BEFORE proceeding. Complete install. Note in EDP: damage was pre-existing.
Case 213/214 — Unit doesn't fit + hostile customer: Garage drop-off. Team safety first. Do NOT force. Document hostility, notify dispatcher + AM.
Case 206 — Concealed damage (broken leg) during unboxing: Initiate Save the Sale. If customer refuses → RTW. No HA if delivery not completed (1:1 rule).
Case 210 — Dent under plastic, customer rep present: If authorized contact accepts, proceed with install. Document name of person who approved in EDP notes.
Case 204 — Short on truck + door damage: STS markdown for damaged items. RS for missing item. Document both in order.
Case 207 — Building security denies access: RTW. Team withdraws. Leave voicemail. Notify dispatcher. Customer must contact building + Lowe's (COI requirements).
Case 217 — Failed dryer delivery: No HA. Leave old unit so customer isn't left without service. Document. Customer contacts Lowe's for next steps.

DRIVER LOAD REFUSAL / REJECTION:
1. Get full details: route #, order #, reason for refusal
2. Do NOT agree or disagree with driver on the spot
3. Notify dispatcher immediately: truck #, stop(s) affected, reason given
4. Dispatcher loops in Area Manager
5. Document in order notes
6. CX calls customer to explain delay/situation
7. Safety concern → document + escalate, do NOT force delivery
8. Driver behavior issue (refusal without valid reason) → Area Manager handles. CX does NOT negotiate pay or threaten driver.
Example: Driver refused load (palm tree pot, safety concern). Store confirmed others carry it. → Mark NOT LOADED, notify dispatcher with full details, AM follows up with hauler.

SAVE THE SALE — FULL PROCESS:
Trigger: team reports cosmetic/concealed damage, customer present. Team MUST stay on-site throughout.

Step 1: Get stop # + confirm photos uploaded to EDP
Step 2: Note — Order #, Selling Channel (POS=store, Lowes_Com=online), 4-digit selling location, Item #
  - Order starts 30 → online → selling location 0902
  - Order starts 20 → store → next 4 digits = selling location

Step 3 — Discounts:
  - Back/Side damage: start 5%, max 20%
  - Front damage: start 10%, max 20%
  - Above 20%: escalate to Lowe's leadership or Lowe's Teams chat
  - Always start LOW. Increase in 5% increments only. Never odd amounts. Never offer max immediately.

Step 4 — STS Script: "Hi, this is [Name] calling from Maersk regarding your delivery from Lowe's. I've had a chance to review the photos provided by the team, and based on that assessment, I'm able to offer you [X]% off the retail selling price of the unit. If you're willing to accept this discount, the delivery team will move forward with the installation and completion of your delivery today. Also, Lowe's will be in contact with you directly with more details about the discount and how it will be applied."
ONLY discuss percentage — NEVER dollar amounts. Never reference Lowes.com pricing.

Refund types: Check/Cash (voucher via email → take to local Lowe's) | Gift Card (mailed, 2-5 biz days) | Credit/Debit (5-10 biz days)

Step 5 — STS Chat (regardless of accept/decline): Send to regional STS Teams chat (open until 9pm local):
Order # | Item # | Discount % | Offer Accepted (Y/N) | Photos Attached
Lowe's responds: Retail Selling Price + Approved Offer Amount. Above 20%: dispatch must upload photos.

Step 6 — STS Form: Your Name, XDT Location, Date, Order #, Selling Location, Item #, Retail Selling Price, Percent Off, Offer Amount, Offer Accepted, Product inspected at XDT = NO, Unit audited = NO, Approving Leader (Lowe's associate who approved). Submit for BOTH accepted AND denied offers.

Discount formula: Retail Price × decimal = Discount Amount (5%=0.05, 10%=0.10, 15%=0.15, 20%=0.20)
If customer refuses → team reloads, dispatch documents + notifies XDT via email.

CLAIMS: Ask if customer has claim #. YES → direct to Claims Dept. NO → customer must contact Lowe's first (Claims can't act without claim in system). Before contacting Claims: EDP ☰ menu → Claims → search by claim # or order #. Email to Claims: claim #, order #, issue summary, what customer is requesting.

COI / BUILDING REQUIREMENTS: COI = Certificate of Insurance. Some buildings require it before allowing delivery. Customer provides building requirements directly to Lowe's. CX: locate order → provide store contact (or Lowe's CS for XDT) → advise customer to contact Lowe's → note the order.

ESCALATION TIERS:
Tier 1 — Notify Dispatcher/Hauler: NAH/Improper NAH, routing issues, copper/plastic line, corroded valves, no shutoff valve, items too large, truck delay/breakdown, intraday not met, drop-off disputes, small truck, lock-box, minor in home, HA disputes, driver load refusal
Tier 2 — CX Leader IMMEDIATELY: Gas leak, water leak, property damage (no altercation), vehicle accident, team hit electrical/cable/phone lines, unsanitary conditions
Tier 3 — CX Leader URGENT: Hostage/police, customer mentions social media/news, property damage WITH altercation, threat of harm to anyone

DIFFICULT SITUATIONS:
Water Leak: Shut off water → detailed info → CX Leader IMMEDIATELY → inform dispatcher/team/hauler/AM → note system → claim: provide store/XDT info
Gas Leak: Detailed info → CX Leader IMMEDIATELY → inform dispatcher/team/hauler/AM → if team can't return: offer Gas Company or Fire Dept → notes + email to field group + CX Leadership
Hostile: Keep team on recorded line DO NOT DISCONNECT → CX Leader immediately → if can't de-escalate: market specialist → dispatcher to AM → notes + email
Injury: Keep on recorded line, max detail → CX Leader → prepare transfer → inform dispatcher → notes + email to Field Group + CX Leaders

EDP NOTE FORMAT: "[VTV/LVM] w/ [Driver/Cust], [situation]. [Action taken]. [Outcome/next step]. [Initials]"
Examples:
- "VTV w/ Driver, unable to install washer - corroded valves, photos in system. Called Cust, advised contact store for service call once valves replaced. ER0149"
- "VTV w/ Cust, Del. Team completed proper NAH. Cust transferred to Lowe's for RS. ER0149"
- "VTV w/ Driver, old appliance still connected on arrival. Instructed team to wait on-site. Cust disconnected unit, proceeded w/ HA + drop-off. Delivery completed. ER0149"
- "VTV w/ Driver, unit doesn't fit + hostile Cust. Garage drop-off completed. Dispatcher + AM notified. ER0149"

COMMUNICATION:
Avoid: "You need to / You have to / There is nothing I can do / Unfortunately / I can have the team do that (without confirming)"
Use: "Would it be possible...? / Let me look into this / I will work on finding a solution / I apologize for the inconvenience"
Internal (Maersk team): full transparency, over-communicate.
External (customers, Lowe's): solution-focused, don't assign blame, don't share everything that went wrong.

GOVERNMENT ORDERS: Identified by program acronym between name (e.g., "John COAD Doe"). Programs: MYCAP, CLEARESULT, COAD, FIRST ENERGY. Highly regulated — if requirements not met, product returns to store/warehouse. Exception: cut power cord of old unit with customer consent + field leadership approval (government orders only, last resort).

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
RESPONSE RULES
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
1. Be concise — agent is on a live call
2. Mixed conditions (part in-scope, part out): address EACH condition separately
3. Too complex or ambiguous to standardize: say so clearly, recommend supervisor
4. Include note_template whenever a documentation-worthy event occurs
5. notify_dispatcher: true for any driver issue, route problem, or load refusal
6. escalate: true for Tier 2 and Tier 3 only
7. Respond in same language as the agent (Spanish or English)
8. Outside knowledge base: "This scenario is not covered in my knowledge base — consult your supervisor or Team Lead."`;

let history = [];
let isLoading = false;
const messagesDiv = document.getElementById('messages');
const inputEl = document.getElementById('userInput');

function md(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<span class="tag">$1</span>')
    .replace(/^- (.*)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>')
    .replace(/\n/g,'<br>');
}

function buildBotBubble(parsed, rawText) {
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (parsed) {
    const t = parsed.tier;
    if (t === 2 || t === 3) bubble.classList.add(t===3?'tier3':'tier2');
    else if (t === 1) bubble.classList.add('tier1');
    else if (parsed.notify_dispatcher && !parsed.escalate) bubble.classList.add('dispatcher');

    if (parsed.badge) {
      const b = document.createElement('div');
      b.className = 'badge ' + (t===2||t===3 ? 'red' : parsed.notify_dispatcher && !parsed.escalate ? 'purple' : 'yellow');
      b.innerHTML = (t===2||t===3?'⚠ ':t===1?'⚡ ':'📡 ') + parsed.badge + (parsed.reason ? ' — ' + parsed.reason : '');
      bubble.appendChild(b);
    }

    const body = document.createElement('div');
    body.innerHTML = md(parsed.response || rawText);
    bubble.appendChild(body);

    if (parsed.note_template) {
      const nb = document.createElement('div');
      nb.className = 'note-box';
      nb.innerHTML = '<div class="note-label">📋 EDP Note Template</div>' + parsed.note_template;
      bubble.appendChild(nb);
    }
  } else {
    bubble.innerHTML = md(rawText);
  }
  return bubble;
}

function appendMsg(role, parsed, rawText) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + role;
  av.textContent = role === 'bot' ? 'CX' : 'AG';
  const bubble = role === 'bot' ? buildBotBubble(parsed, rawText) : (() => {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = rawText;
    return b;
  })();
  div.appendChild(av);
  div.appendChild(bubble);
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'thinking';
  const av = document.createElement('div'); av.className = 'avatar bot'; av.textContent = 'CX';
  const b = document.createElement('div'); b.className = 'thinking';
  b.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(av); div.appendChild(b);
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  appendMsg('user', null, text);
  history.push({ role: 'user', content: text });
  isLoading = true; showThinking();

  try {
    const _k = atob("c2stYW50LWFwaTAzLVd5U2xZZ0xzRnhoMmNhdVp0QVlFOUsxbTczSXdoZ0hkQ2xVQ2U5anBRMmJVeDZsYkJNR3JTRlpub2NxMV9Yc1AzZE1aM1hhbk9zYnFIeFM3d0dOcEZ3LW1zR3ZUQUFB");
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: 'POST',
      headers: { "Content-Type": "application/json", "x-api-key": _k, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYS, messages: history })
    });
    const data = await res.json();
    document.getElementById('thinking')?.remove();
    const raw = data.content?.[0]?.text || '';
    history.push({ role: 'assistant', content: raw });
    let parsed = null;
    try { parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); } catch(e) {}
    appendMsg('bot', parsed, parsed ? parsed.response : raw);
  } catch(e) {
    document.getElementById('thinking')?.remove();
    appendMsg('bot', null, '**Connection error.** Please try again or contact your supervisor.');
  } finally { isLoading = false; }
}

inputEl.addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; });
inputEl.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });

// PASSWORD GATE
const PASS = 'lowes25';
const authScreen = document.createElement('div');
authScreen.id = 'auth';
authScreen.style.cssText = 'position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px;';
authScreen.innerHTML = `
  <div style="text-align:center;margin-bottom:8px;">
    <div style="font-family:IBM Plex Mono,monospace;font-weight:600;font-size:16px;color:#42b0d5;letter-spacing:0.1em;">MAERSK</div>
    <div style="font-size:12px;color:#8899bb;margin-top:4px;">Lowe's Last Mile CX Assistant</div>
  </div>
  <div style="background:#111827;border:1px solid #1e3a5f;border-radius:12px;padding:28px 32px;width:300px;display:flex;flex-direction:column;gap:14px;">
    <div style="font-size:13px;color:#e2e8f0;font-weight:600;text-align:center;">Enter access password</div>
    <input id="passInput" type="password" placeholder="Password" style="background:#1a2236;border:1px solid #1e3a5f;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;outline:none;font-family:IBM Plex Sans,sans-serif;width:100%;" />
    <div id="passError" style="font-size:11px;color:#ef4444;text-align:center;display:none;">Incorrect password. Try again.</div>
    <button id="passBtn" style="padding:11px;background:linear-gradient(135deg,#0066cc,#00aaff);border:none;border-radius:8px;color:white;font-size:14px;font-weight:600;cursor:pointer;font-family:IBM Plex Sans,sans-serif;">Access</button>
  </div>
  <div style="font-size:11px;color:#1e3a5f;font-family:IBM Plex Mono,monospace;">CONFIDENTIAL · INTERNAL USE ONLY</div>
`;
document.body.appendChild(authScreen);

function checkPass() {
  const val = document.getElementById('passInput').value;
  if (val === PASS) {
    authScreen.style.opacity = '0';
    authScreen.style.transition = 'opacity 0.3s';
    setTimeout(() => authScreen.remove(), 300);
  } else {
    document.getElementById('passError').style.display = 'block';
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
  }
}
document.getElementById('passBtn').onclick = checkPass;
document.getElementById('passInput').addEventListener('keydown', e => { if(e.key==='Enter') checkPass(); });
setTimeout(() => document.getElementById('passInput').focus(), 100);

// Welcome
const wd = document.createElement('div'); wd.className = 'msg bot';
const wa = document.createElement('div'); wa.className = 'avatar bot'; wa.textContent = 'CX';
const wb = document.createElement('div'); wb.className = 'bubble';
wb.innerHTML = md('**Maersk Last Mile CX Assistant v2** — ready.\n\nDescribe the situation and I\'ll give you the right protocol, EDP note template, and escalation guidance. Works for **customer calls**, **driver issues**, and **installation scenarios**.');
const wc = document.createElement('div'); wc.className = 'chips';
['Ghost / dropped call','Driver refusing load','Active water leak','Save the Sale – damage','Installation out of scope','NAH procedure','Supervisor transfer','Customer wants to reschedule','COI / building requirements','Claims process'].forEach(label => {
  const c = document.createElement('button'); c.className = 'chip'; c.textContent = label;
  c.onclick = () => { inputEl.value = label; sendMessage(); };
  wc.appendChild(c);
});
wb.appendChild(wc); wd.appendChild(wa); wd.appendChild(wb); messagesDiv.appendChild(wd);
</script>
