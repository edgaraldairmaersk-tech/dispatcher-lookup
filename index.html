<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatcher Lookup</title>
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-border: #5DCAA5;
    --green-text: #085041;
    --green-sub: #0F6E56;
    --amber-light: #FAEEDA;
    --amber-border: #EF9F27;
    --amber-text: #633806;
    --bg: #F5F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EFEA;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b66;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #252523;
      --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0efe8;
      --text2: #9a9a92;
      --green-light: #0a2e22;
      --green-border: #1D9E75;
      --green-text: #9FE1CB;
      --green-sub: #5DCAA5;
      --amber-light: #2a1f0a;
      --amber-border: #BA7517;
      --amber-text: #FAC775;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
  }
  .container { max-width: 520px; margin: 0 auto; }
  header { padding: 1.5rem 0 1rem; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .logo-icon {
    width: 36px; height: 36px; background: var(--green); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .subtitle { font-size: 13px; color: var(--text2); margin-left: 46px; }

  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    margin-bottom: 1rem;
  }
  .tab {
    flex: 1; padding: 10px 8px; font-size: 13px; cursor: pointer;
    background: transparent; color: var(--text2); border: none;
    border-bottom: 2px solid transparent; transition: all 0.15s;
    text-align: center; font-weight: 500;
  }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; font-weight: 500; letter-spacing: 0.02em; }
  input, select {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text);
    margin-bottom: 10px; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { outline: none; border-color: var(--green); }

  .btn {
    width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; border-radius: var(--radius-sm);
    border: none; background: var(--green); color: white;
    transition: background 0.15s; letter-spacing: 0.01em;
  }
  .btn:hover { background: var(--green-dark); }
  .btn:active { transform: scale(0.99); }

  .hint { font-size: 12px; color: var(--text2); margin-bottom: 12px; margin-top: -6px; }

  .result-found {
    background: var(--green-light); border: 1px solid var(--green-border);
    border-radius: var(--radius); padding: 1.25rem; margin-top: 0.75rem;
    display: none; animation: fadeIn 0.2s ease;
  }
  .result-unknown {
    background: var(--amber-light); border: 1px solid var(--amber-border);
    border-radius: var(--radius); padding: 1rem; margin-top: 0.75rem;
    display: none; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .rname { font-size: 22px; font-weight: 700; color: var(--green-text); }
  .rmeta { font-size: 13px; color: var(--green-sub); margin-top: 3px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .chip {
    font-size: 12px; font-weight: 600; padding: 3px 10px;
    border-radius: 99px; background: var(--green-border);
    color: var(--green-text);
  }
  .chip-blue { background: #B5D4F4; color: #0C447C; }
  @media (prefers-color-scheme: dark) { .chip-blue { background: #0C447C; color: #B5D4F4; } }

  .wtext { font-size: 14px; color: var(--amber-text); line-height: 1.5; }
  .wtext strong { font-weight: 600; }

  .section-title {
    font-size: 11px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
  }

  .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .bundle-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; }
  .bnum { font-size: 11px; color: var(--text2); font-weight: 600; margin-bottom: 4px; }
  .bname-input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid var(--border2); border-radius: 0;
    margin: 0; padding: 3px 0; font-size: 13px; font-weight: 600;
    color: var(--text);
  }
  .bname-input:focus { outline: none; border-bottom-color: var(--green); }

  .save-notice {
    font-size: 12px; color: var(--green); margin-top: 10px;
    font-weight: 600; display: none; text-align: center;
  }

  .reset-row { display: flex; justify-content: flex-end; margin-top: 10px; }
  .btn-sm {
    font-size: 12px; padding: 5px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .btn-sm:hover { background: var(--surface2); }

  .date-badge {
    font-size: 12px; color: var(--text2); text-align: right;
    margin-bottom: 6px; font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">📦</div>
      <h1>Dispatcher Lookup</h1>
    </div>
    <div class="subtitle">Busca al dispatcher de cualquier orden EDP al instante</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')">Buscar</button>
    <button class="tab" onclick="switchTab('dispatchers')">Dispatchers de hoy</button>
  </div>

  <!-- SEARCH -->
  <div class="panel active" id="tab-search">
    <div class="card">
      <label>Route code o número de tienda</label>
      <input type="text" id="routeInput"
        placeholder="ej. 2533BOX01  /  XDTJMO06  /  2533"
        oninput="clearResult()"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <p class="hint">Acepta route completo, store number o código XDT</p>
      <button class="btn" onclick="lookup()">Buscar dispatcher</button>

      <div class="result-found" id="resultFound">
        <div class="rname" id="rName"></div>
        <div class="rmeta" id="rMeta"></div>
        <div class="chips" id="rChips"></div>
      </div>
      <div class="result-unknown" id="resultUnknown">
        <div class="wtext" id="warnMsg"></div>
      </div>
    </div>
  </div>

  <!-- DISPATCHERS HOY -->
  <div class="panel" id="tab-dispatchers">
    <div class="card">
      <div class="date-badge" id="dateLabel"></div>
      <div class="section-title">Edita los nombres del día</div>
      <div class="bundle-grid" id="bundleGrid"></div>
      <p class="save-notice" id="saveNotice">✓ Guardado</p>
      <div class="reset-row">
        <button class="btn-sm" onclick="resetDispatchers()">Restaurar defaults</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORE_MAP = {

  597:6,614:5,61:13,643:6,66:5,674:7,688:12,694:3,69:1,714:7,71:1,721:5,

  785:15,790:5,791:9,792:7,795:5,8:5,92:2,
};

const XDT_MAP = {
  XDTGRD:1,XDTHZL:2,XDTDEN:3,XDTCDR:4,XDTKC:5,
  XDTJMO:6,XDTPHX:7,XDTMV:8,XDTLA:9,XDTTRY:10,
  XDTORG:11,XDTOAK:12,XDTWA:13,XDTLV:16,
};

const BUNDLES = [
  {b:1, area:"GRD", xdt:"XDTGRD 3939", def:"Rogelio Morales"},
  {b:2, area:"HZL", xdt:"XDTHZL 3887", def:"Moises Estrada"},
  {b:3, area:"DEN", xdt:"XDTDEN 3987", def:"Maria Gordillo"},
  {b:4, area:"CDR", xdt:"XDTCDR 3984", def:"Ivan Duran"},
  {b:5, area:"KC",  xdt:"XDTKC 3994",  def:"Carlos Colin"},
  {b:6, area:"JMO", xdt:"XDTJMO 3995", def:"David Vega"},
  {b:7, area:"PHX", xdt:"XDTPHX 3345", def:"Estefany Garcia"},
  {b:8, area:"MV",  xdt:"XDTMV 3363",  def:"Saul Mendez"},
  {b:9, area:"LA",  xdt:"XDTLA 3956",  def:"Mario Garcia"},
  {b:10, area:"TRY",xdt:"XDTTRY 3966", def:"Bryan Martinez"},
  {b:11, area:"ORG",xdt:"XDTORG 3971", def:"Mario Pacheco"},
  {b:12, area:"OAK",xdt:"XDTOAK 3974", def:"Pablo Sosa"},
  {b:13, area:"WA", xdt:"XDTWA 3989",  def:"Roberto Uriostegui"},
  {b:14, area:"NFB",xdt:"—",           def:"Angelica Amador"},
  {b:15, area:"SFB",xdt:"—",           def:"Luis Hernandez"},
  {b:16, area:"LV", xdt:"XDTLV 3975",  def:"Francisco Sosa"},
];

let dispatchers = {};
try { dispatchers = JSON.parse(localStorage.getItem('dispatchersToday') || '{}'); } catch(e){}

function getDispatcher(b) {
  return dispatchers[b] || BUNDLES.find(x=>x.b===b).def;
}
function saveDispatcher(b, name) {
  dispatchers[b] = name;
  try { localStorage.setItem('dispatchersToday', JSON.stringify(dispatchers)); } catch(e){}
  const n = document.getElementById('saveNotice');
  n.style.display = 'block';
  clearTimeout(n._t);
  n._t = setTimeout(()=>n.style.display='none', 1800);
}
function resetDispatchers() {
  if (!confirm('¿Restaurar los nombres por default?')) return;
  dispatchers = {};
  try { localStorage.removeItem('dispatchersToday'); } catch(e){}
  renderBundleGrid();
}

function findBundle(raw) {
  const upper = raw.toUpperCase().trim();
  for (const [xdt, b] of Object.entries(XDT_MAP)) {
    if (upper.startsWith(xdt)) return b;
  }
  const m = raw.match(/^(\d+)/);
  if (m) {
    const num = parseInt(m[1]);
    if (STORE_MAP[num]) return STORE_MAP[num];
  }
  return null;
}

function lookup() {
  const raw = document.getElementById('routeInput').value.trim();
  if (!raw) return;
  const bundle = findBundle(raw);
  document.getElementById('resultFound').style.display = 'none';
  document.getElementById('resultUnknown').style.display = 'none';
  if (bundle) {
    const info = BUNDLES.find(x=>x.b===bundle);
    document.getElementById('rName').textContent = getDispatcher(bundle);
    document.getElementById('rMeta').textContent = 'Bundle ' + bundle + ' — Área ' + info.area;
    document.getElementById('rChips').innerHTML =
      '<span class="chip chip-blue">' + info.xdt + '</span>';
    document.getElementById('resultFound').style.display = 'block';
  } else {
    const m = raw.match(/^(\d+)/);
    const num = m ? m[1] : raw;
    document.getElementById('warnMsg').innerHTML =
      '<strong>Store ' + num + ' no encontrado</strong><br>' +
      'Este número no está en la lista actual. Verifica el dato.';
    document.getElementById('resultUnknown').style.display = 'block';
  }
}

function clearResult() {
  document.getElementById('resultFound').style.display = 'none';
  document.getElementById('resultUnknown').style.display = 'none';
}

function renderBundleGrid() {
  const grid = document.getElementById('bundleGrid');
  grid.innerHTML = BUNDLES.map(d => `
    <div class="bundle-item">
      <div class="bnum">B${d.b} · ${d.area}</div>
      <input class="bname-input" type="text" value="${getDispatcher(d.b)}"
        onchange="saveDispatcher(${d.b}, this.value)"
        placeholder="Dispatcher">
    </div>
  `).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['search','dispatchers'][i]===name));
  document.querySelectorAll('.panel').forEach((p,i) =>
    p.classList.toggle('active', ['tab-search','tab-dispatchers'][i]==='tab-'+name));
  if (name === 'dispatchers') {
    renderBundleGrid();
    const d = new Date();
    document.getElementById('dateLabel').textContent =
      d.toLocaleDateString('es-MX', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  }
}

document.getElementById('routeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});
</script>
</body>
</html>
